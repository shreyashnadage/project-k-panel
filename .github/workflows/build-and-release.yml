name: Build & Release Agent

# Triggers:
#   - push a version tag  →  full build + GitHub Release + update latest.json
#   - push to main        →  build only (smoke-test the spec)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # JOB 1: Build executables on Windows
  # -----------------------------------------------------------------------
  build:
    name: Build Agent + Wizard
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      agent_sha256: ${{ steps.checksum.outputs.agent_sha256 }}
      wizard_sha256: ${{ steps.checksum.outputs.wizard_sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag or branch
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[agent]"
          pip install pyinstaller packaging

      - name: Run unit tests
        run: |
          pip install pytest
          pytest tests/ -x -q --ignore=tests/e2e --ignore=tests/integration
        continue-on-error: false

      - name: Build with PyInstaller
        run: pyinstaller TallySyncAgent.spec --clean

      - name: Rename artifacts with version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv dist/TallySyncAgent.exe "dist/TallySyncAgent-${VERSION}.exe"
          mv dist/registration_wizard.exe "dist/registration_wizard-${VERSION}.exe"
          # Keep un-versioned copy for the installer ISS script
          cp "dist/TallySyncAgent-${VERSION}.exe" dist/TallySyncAgent.exe
          cp "dist/registration_wizard-${VERSION}.exe" dist/registration_wizard.exe

      - name: Compute SHA-256 checksums
        id: checksum
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          AGENT_SHA=$(sha256sum "dist/TallySyncAgent-${VERSION}.exe" | awk '{print $1}')
          WIZARD_SHA=$(sha256sum "dist/registration_wizard-${VERSION}.exe" | awk '{print $1}')
          echo "agent_sha256=$AGENT_SHA" >> "$GITHUB_OUTPUT"
          echo "wizard_sha256=$WIZARD_SHA" >> "$GITHUB_OUTPUT"
          echo "Agent SHA256:  $AGENT_SHA"
          echo "Wizard SHA256: $WIZARD_SHA"

      # Optional: code-sign with EV cert stored as repo secret
      # - name: Sign executables
      #   if: startsWith(github.ref, 'refs/tags/')
      #   run: |
      #     echo "${{ secrets.CODE_SIGNING_CERT_B64 }}" | base64 --decode > cert.pfx
      #     signtool sign /f cert.pfx /p "${{ secrets.CODE_SIGNING_PASSWORD }}" \
      #       /tr http://timestamp.digicert.com /td sha256 /fd sha256 \
      #       dist/TallySyncAgent.exe dist/registration_wizard.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-executables
          path: |
            dist/TallySyncAgent*.exe
            dist/registration_wizard*.exe
          retention-days: 30

  # -----------------------------------------------------------------------
  # JOB 2: Build Inno Setup installer (requires the exe from job 1)
  # -----------------------------------------------------------------------
  installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download executables
        uses: actions/download-artifact@v4
        with:
          name: agent-executables
          path: dist/

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          iscc /DAppVersion="${{ needs.build.outputs.version }}" installer\TallySyncAgent.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/installer/TallySyncAgent-Setup-*.exe
          retention-days: 90

  # -----------------------------------------------------------------------
  # JOB 3: Publish GitHub Release + update releases/latest.json
  # -----------------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, installer]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Update releases/latest.json
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.agent_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          cat > releases/latest.json <<EOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${REPO}/releases/download/v${VERSION}/TallySyncAgent-${VERSION}.exe",
            "checksum_sha256": "${SHA256}",
            "release_notes": "See https://github.com/${REPO}/releases/tag/v${VERSION}",
            "min_agent_version": "0.1.0",
            "is_critical": false,
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat releases/latest.json

      - name: Commit updated latest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/latest.json
          git commit -m "chore: update latest.json to v${{ needs.build.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tally Sync Agent v${{ needs.build.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/agent-executables/TallySyncAgent-*.exe
            artifacts/installer/TallySyncAgent-Setup-*.exe
          generate_release_notes: true
