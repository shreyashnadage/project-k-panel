# Logstash Pipeline Configuration for Tally Sync Agent Audit Events

input {
  # TCP input on port 5000 for audit events
  tcp {
    port => 5000
    codec => json
    type => "audit"
  }
}

filter {
  # Only process audit events
  if [type] == "audit" {

    # Parse timestamp if it's a string
    if [timestamp] =~ /^\d{4}-\d{2}-\d{2}T/ {
      date {
        match => [ "timestamp", "ISO8601" ]
        target => "@timestamp"
      }
    }

    # Normalize field names
    mutate {
      rename => {
        "principal_client_id" => "client_id"
        "principal_role" => "role"
        "resource_type" => "resource"
        "resource_id" => "resource_id"
        "event_type" => "event_type"
      }

      # Add host information
      add_field => { "[@metadata][index_name]" => "tally-sync-events-%{+YYYY.MM.dd}" }
    }

    # Add source information
    if ![source_ip] {
      mutate {
        add_field => { "source_ip" => "%{host}" }
      }
    }
  }
}

output {
  # Send to Elasticsearch
  if [type] == "audit" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "%{[@metadata][index_name]}"
      document_type => "_doc"
    }

    # Also log to stdout for debugging (remove in production)
    stdout {
      codec => rubydebug
    }
  }
}
